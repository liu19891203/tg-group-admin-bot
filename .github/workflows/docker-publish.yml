name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check Docker Hub secrets
        id: dockerhub
        env:
          DOCKERHUB_USERNAME_RAW: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          username="$(printf '%s' "$DOCKERHUB_USERNAME_RAW" | tr -d '\r' | xargs)"
          if [ -n "$username" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "username=$username" >> "$GITHUB_OUTPUT"
            echo "image=$username/tg-group-admin" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub configuration is incomplete." >> "$GITHUB_STEP_SUMMARY"
            echo "- DOCKERHUB_USERNAME: add it as a repository secret or variable" >> "$GITHUB_STEP_SUMMARY"
            echo "- DOCKERHUB_TOKEN: add it as a repository secret" >> "$GITHUB_STEP_SUMMARY"
            echo "Then rerun this workflow." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout
        if: steps.dockerhub.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.dockerhub.outputs.configured == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ steps.dockerhub.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.dockerhub.outputs.configured == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.dockerhub.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push
        if: steps.dockerhub.outputs.configured == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

[pytest]
addopts = -p no:cacheprovider
pythonpath = .
testpaths = tests
filterwarnings =
    ignore:datetime\.datetime\.utcfromtimestamp\(\) is deprecated.*:DeprecationWarning:pytz\.tzinfo
norecursedirs =
    .git
    .venv
    __pycache__
    __patched_source_workspace
    codex_tmp_dir
    pytest-cache-files-*
